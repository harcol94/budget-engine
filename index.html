<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Budget Engine (Stable)</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:white;
}

.container{
  max-width:520px;
  margin:auto;
  padding:16px;
}

.card{
  background:#161c2e;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
  background:#0b0f19;
  color:white;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  font-weight:bold;
}

.bar{
  height:10px;
pi  background:#0b0f19;
  border-radius:8px;
  overflow:hidden;
  margin-top:6px;
}

.fill{
  height:100%;
  width:0%;
  background:#22c55e;
}

.row{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  opacity:0.85;
}

.history{
  font-size:12px;
  border-top:1px solid #222a44;
  padding-top:8px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 Budget Engine (Stable)</h2>

<div class="card">
  <input id="paycheck" type="number" placeholder="Paycheck amount">
  <button onclick="run()">Distribute Paycheck</button>
</div>

<div class="card">

  <!-- CORE BILLS -->
  <input id="rent" placeholder="Rent">
  <div class="bar"><div id="rentBar" class="fill"></div></div>
  <div class="row"><span>Rent</span><span id="rentText"></span></div>

  <input id="electric" placeholder="Electric">
  <div class="bar"><div id="electricBar" class="fill"></div></div>
  <div class="row"><span>Electric</span><span id="electricText"></span></div>

  <input id="internet" placeholder="Internet">
  <div class="bar"><div id="internetBar" class="fill"></div></div>
  <div class="row"><span>Internet</span><span id="internetText"></span></div>

  <input id="phone" placeholder="Phone">
  <div class="bar"><div id="phoneBar" class="fill"></div></div>
  <div class="row"><span>Phone</span><span id="phoneText"></span></div>

  <input id="credit" placeholder="Credit Card">
  <div class="bar"><div id="creditBar" class="fill"></div></div>
  <div class="row"><span>Credit</span><span id="creditText"></span></div>

  <input id="car" placeholder="Car Payment">
  <div class="bar"><div id="carBar" class="fill"></div></div>
  <div class="row"><span>Car</span><span id="carText"></span></div>

  <!-- EXPANDED LIFE BILLS -->
  <input id="groceries" placeholder="Groceries">
  <div class="bar"><div id="groceriesBar" class="fill"></div></div>
  <div class="row"><span>Groceries</span><span id="groceriesText"></span></div>

  <input id="gas" placeholder="Gas / Fuel">
  <div class="bar"><div id="gasBar" class="fill"></div></div>
  <div class="row"><span>Gas</span><span id="gasText"></span></div>

  <input id="insurance" placeholder="Auto Insurance">
  <div class="bar"><div id="insuranceBar" class="fill"></div></div>
  <div class="row"><span>Insurance</span><span id="insuranceText"></span></div>

  <input id="health" placeholder="Health Insurance">
  <div class="bar"><div id="healthBar" class="fill"></div></div>
  <div class="row"><span>Health</span><span id="healthText"></span></div>

  <input id="child" placeholder="Child Expenses">
  <div class="bar"><div id="childBar" class="fill"></div></div>
  <div class="row"><span>Child</span><span id="childText"></span></div>

  <input id="streaming" placeholder="Streaming Services">
  <div class="bar"><div id="streamingBar" class="fill"></div></div>
  <div class="row"><span>Streaming</span><span id="streamingText"></span></div>

  <input id="emergency" placeholder="Emergency Fund">
  <div class="bar"><div id="emergencyBar" class="fill"></div></div>
  <div class="row"><span>Emergency</span><span id="emergencyText"></span></div>

  <input id="misc" placeholder="Miscellaneous">
  <div class="bar"><div id="miscBar" class="fill"></div></div>
  <div class="row"><span>Misc</span><span id="miscText"></span></div>

</div>

<div class="card">
  <h3>History</h3>
  <div id="history"></div>
</div>

</div>

<script>

let history = [];

let state = {
  rent:0,
  electric:0,
  internet:0,
  phone:0,
  credit:0,
  car:0,
  groceries:0,
  gas:0,
  insurance:0,
  health:0,
  child:0,
  streaming:0,
  emergency:0,
  misc:0
};

function val(id){
  return Number(document.getElementById(id).value) || 0;
}

function run(){

  let paycheck = val("paycheck");
  if(paycheck <= 0) return;

  let allocation = paycheck * 0.8;

  let bills = {
    rent: val("rent"),
    electric: val("electric"),
    internet: val("internet"),
    phone: val("phone"),
    credit: val("credit"),
    car: val("car"),
    groceries: val("groceries"),
    gas: val("gas"),
    insurance: val("insurance"),
    health: val("health"),
    child: val("child"),
    streaming: val("streaming"),
    emergency: val("emergency"),
    misc: val("misc")
  };

  let keys = Object.keys(bills);

  let needs = {};
  let totalNeed = 0;

  for(let k of keys){
    let need = Math.max(0, bills[k] - state[k]);
    if(need > 0){
      needs[k] = need;
      totalNeed += need;
    }
  }

  let snapshot = {
    time: new Date().toLocaleString(),
    paycheck,
    allocations:{}
  };

  for(let k in needs){

    let share = (needs[k] / totalNeed) * allocation;

    state[k] += share;

    snapshot.allocations[k] = share;
  }

  history.unshift(snapshot);
  history = history.slice(0,10);

  updateUI(bills);
  renderHistory();
}

function updateUI(bills){

  for(let k in bills){

    let pct = bills[k] ? (state[k] / bills[k]) * 100 : 0;

    document.getElementById(k+"Bar").style.width = Math.min(pct,100)+"%";

    document.getElementById(k+"Text").innerText =
      `$${state[k].toFixed(0)} / $${bills[k].toFixed(0)}`;
  }
}

function renderHistory(){

  let el = document.getElementById("history");
  el.innerHTML = "";

  history.forEach(h=>{

    let total = Object.values(h.allocations)
      .reduce((a,b)=>a+b,0);

    let div = document.createElement("div");
    div.className = "history";

    div.innerHTML = `
      <b>${h.time}</b><br>
      Paycheck: $${h.paycheck}<br>
      Allocated: $${total.toFixed(2)}
    `;

    el.appendChild(div);
  });
}

</script>

</body>
</html>
